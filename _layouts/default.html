<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p class="site-tagline">{{ site.description }}</p>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/weekly' | relative_url }}">Weekly Events</a>
        <a href="{{ '/special' | relative_url }}">Special Events</a>
        <a href="{{ '/venues' | relative_url }}">Venues</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Angra Events &mdash; A community guide to what's happening in Angra do Hero&iacute;smo, Terceira, A&ccedil;ores</p>
    </div>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="hero-image"></div>
    <div class="header-content">
      <div class="container">
        <h1 class="site-title"><a href="{{ '/' | relative_url }}">Angra Events</a></h1>
        <p class="site-tagline">What's happening in Angra do Hero&iacute;smo, Terceira</p>
      </div>
    </div>
    <nav class="site-nav">
      <div class="container">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/weekly' | relative_url }}">Weekly</a>
        <a href="{{ '/special' | relative_url }}">Special Events</a>
        <a href="{{ '/venues' | relative_url }}">Venues</a>
        <a href="{{ '/contribute' | relative_url }}">Contribute</a>
        <a href="{{ '/resources' | relative_url }}">Resources</a>
      </div>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <!-- Lightbox overlay -->
  <div class="lightbox-overlay" id="lightbox">
    <img src="" alt="Full-size image" id="lightbox-img">
  </div>
  <script>
  (function() {
    var overlay = document.getElementById('lightbox');
    var lbImg = document.getElementById('lightbox-img');
    document.addEventListener('click', function(e) {
      if (e.target.matches('[data-lightbox]')) {
        e.preventDefault();
        lbImg.src = e.target.src;
        lbImg.alt = e.target.alt;
        overlay.classList.add('active');
      }
    });
    overlay.addEventListener('click', function() {
      overlay.classList.remove('active');
      lbImg.src = '';
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        overlay.classList.remove('active');
        lbImg.src = '';
      }
    });
  })();
  </script>

  <footer class="site-footer">
    <div class="container">
      <p>Angra Events &mdash; A community guide to Angra do Hero&iacute;smo, Terceira, A&ccedil;ores</p>
      <p class="attribution">Hero photo by <a href="https://commons.wikimedia.org/wiki/File:Angra_do_Hero%C3%ADsmo_-_Sicht_vom_Obelisken_auf_Stadt_und_Hafenbucht_mit_Monte_Brasil.JPG">Franzfoto</a> / CC BY-SA 3.0</p>
    </div>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="hero-image"></div>
    <div class="header-content">
      <div class="container">
        <h1 class="site-title"><a href="{{ '/' | relative_url }}">Terceira Events</a></h1>
        <p class="site-tagline">What's happening on Terceira Island, A&ccedil;ores</p>
      </div>
    </div>
    <nav class="site-nav">
      <div class="container">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/weekly' | relative_url }}">Weekly</a>
        <a href="{{ '/special' | relative_url }}">Special Events</a>
        <a href="{{ '/venues' | relative_url }}">Venues</a>
        <a href="{{ '/contribute' | relative_url }}">Contribute</a>
        <a href="{{ '/resources' | relative_url }}">Resources</a>
      </div>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <!-- Lightbox overlay -->
  <div class="lightbox-overlay" id="lightbox">
    <img src="" alt="Full-size image" id="lightbox-img">
  </div>

  <!-- Flag event modal -->
  <div class="flag-overlay" id="flag-overlay" aria-hidden="true">
    <div class="flag-modal" role="dialog" aria-modal="true" aria-labelledby="flag-title">
      <div class="flag-header">
        <h3 id="flag-title">Suggest an Edit</h3>
        <button type="button" class="flag-close" id="flag-close" aria-label="Close">&times;</button>
      </div>
      <div class="flag-event-context" id="flag-event-context"></div>
      <form id="flag-form">
        <div class="form-field">
          <label for="flag-reason">What needs to change? <span class="required">*</span></label>
          <textarea id="flag-reason" name="reason" rows="5" required
            placeholder="Wrong time, wrong venue, cancelled, typo, missing details, etc."></textarea>
        </div>
        <div class="form-field">
          <label for="flag-submitter">Your Name</label>
          <input type="text" id="flag-submitter" name="submitterName" maxlength="100" placeholder="Optional">
        </div>
        <!-- Honeypot -->
        <div style="position:absolute; left:-9999px; opacity:0; pointer-events:none;" aria-hidden="true">
          <label for="flag-website">Website</label>
          <input type="text" id="flag-website" name="website" tabindex="-1" autocomplete="off">
        </div>
        <button type="submit" id="flag-submit" class="form-submit">Submit</button>
        <div id="flag-message" class="form-message" style="display:none;"></div>
      </form>
    </div>
  </div>
  <script>
  (function() {
    var overlay = document.getElementById('lightbox');
    var lbImg = document.getElementById('lightbox-img');
    document.addEventListener('click', function(e) {
      if (e.target.matches('[data-lightbox]')) {
        e.preventDefault();
        lbImg.src = e.target.src;
        lbImg.alt = e.target.alt;
        overlay.classList.add('active');
      }
    });
    overlay.addEventListener('click', function() {
      overlay.classList.remove('active');
      lbImg.src = '';
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        overlay.classList.remove('active');
        lbImg.src = '';
      }
    });
  })();

  // --- Flag event modal ---
  (function() {
    var FLAG_URL = 'https://event-submit-worker.terceriaevents.workers.dev/flag-event';
    var flagOverlay = document.getElementById('flag-overlay');
    var flagClose = document.getElementById('flag-close');
    var flagContext = document.getElementById('flag-event-context');
    var flagForm = document.getElementById('flag-form');
    var flagReason = document.getElementById('flag-reason');
    var flagSubmitter = document.getElementById('flag-submitter');
    var flagWebsite = document.getElementById('flag-website');
    var flagSubmit = document.getElementById('flag-submit');
    var flagMessage = document.getElementById('flag-message');
    var currentEvent = null;

    function openModal(eventData) {
      currentEvent = eventData;
      var parts = [];
      parts.push('<strong>' + escapeHtml(eventData.name) + '</strong>');
      if (eventData.date) parts.push(escapeHtml(eventData.date));
      if (eventData.venue) parts.push(escapeHtml(eventData.venue));
      flagContext.innerHTML = parts.join('<br>');
      flagReason.value = '';
      flagSubmitter.value = '';
      flagWebsite.value = '';
      flagMessage.style.display = 'none';
      flagSubmit.disabled = false;
      flagSubmit.textContent = 'Submit';
      flagOverlay.classList.add('active');
      setTimeout(function() { flagReason.focus(); }, 100);
    }

    function closeModal() {
      flagOverlay.classList.remove('active');
      currentEvent = null;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showMessage(text, type) {
      flagMessage.textContent = text;
      flagMessage.className = 'form-message ' + type;
      flagMessage.style.display = 'block';
    }

    document.addEventListener('click', function(e) {
      var btn = e.target.closest && e.target.closest('.event-flag-btn');
      if (btn) {
        e.preventDefault();
        openModal({
          name: btn.getAttribute('data-event-name'),
          date: btn.getAttribute('data-event-date'),
          venue: btn.getAttribute('data-event-venue'),
        });
      }
    });

    flagClose.addEventListener('click', closeModal);
    flagOverlay.addEventListener('click', function(e) {
      if (e.target === flagOverlay) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && flagOverlay.classList.contains('active')) {
        closeModal();
      }
    });

    flagForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      flagMessage.style.display = 'none';

      if (flagWebsite.value.trim()) {
        // Honeypot — pretend success
        showMessage('Thank you! Your suggestion has been submitted.', 'success');
        setTimeout(closeModal, 1200);
        return;
      }

      var reason = flagReason.value.trim();
      if (!reason || !currentEvent) {
        showMessage('Please describe what needs to change.', 'error');
        return;
      }

      flagSubmit.disabled = true;
      flagSubmit.textContent = 'Submitting...';

      try {
        var response = await fetch(FLAG_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            eventName: currentEvent.name,
            eventDate: currentEvent.date,
            eventVenue: currentEvent.venue,
            reason: reason,
            submitterName: flagSubmitter.value.trim() || undefined,
          }),
        });
        var result = await response.json().catch(function() { return {}; });
        if (response.ok && result.success) {
          showMessage('Thank you! Your suggestion has been submitted.', 'success');
          setTimeout(closeModal, 1200);
        } else {
          showMessage(result.error || 'Something went wrong. Please try again later.', 'error');
          flagSubmit.disabled = false;
          flagSubmit.textContent = 'Submit';
        }
      } catch (err) {
        showMessage('Network error. Please check your connection.', 'error');
        flagSubmit.disabled = false;
        flagSubmit.textContent = 'Submit';
      }
    });
  })();

  // --- Event search, range, and tag filter ---
  (function() {
    var bars = document.querySelectorAll('.event-search-bar');
    if (!bars.length) return;

    var RANGE_DAYS = { week: 7, month: 31, year: 365 };
    var VALID_RANGES = { week: 1, month: 1, year: 1, all: 1 };

    function normalize(s) { return (s || '').toLowerCase(); }

    function parseEventDate(s) {
      var m = (s || '').match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (!m) return null;
      return new Date(+m[1], +m[2] - 1, +m[3]);
    }

    function inRange(eventDate, range) {
      if (!eventDate) return true;
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      if (eventDate < today) return false;
      if (range === 'all' || !RANGE_DAYS[range]) return true;
      var end = new Date(today);
      end.setDate(end.getDate() + RANGE_DAYS[range]);
      return eventDate < end;
    }

    bars.forEach(function(bar) {
      var input = bar.querySelector('.event-search-input');
      var tagSelect = bar.querySelector('.event-tag-filter');
      var rangeSelect = bar.querySelector('.event-range-filter');
      var defaultRange = bar.getAttribute('data-default-range') || 'all';

      // Find the event cards that follow this bar.
      var scope = bar.parentElement;
      var cards = [];
      var node = bar.nextElementSibling;
      while (node) {
        if (node.classList && node.classList.contains('special-event')) {
          cards.push(node);
        } else if (node.querySelectorAll) {
          var inner = node.querySelectorAll('.special-event');
          for (var i = 0; i < inner.length; i++) cards.push(inner[i]);
        }
        node = node.nextElementSibling;
      }
      if (!cards.length) return;

      var empty = scope.querySelector('.event-search-empty') ||
                  document.querySelector('.event-search-empty');

      // Cache parsed dates so we don't re-parse on every keystroke.
      var cardDates = cards.map(function(card) {
        return parseEventDate(card.getAttribute('data-event-date'));
      });

      function cardTags(card) {
        var raw = card.getAttribute('data-event-tags') || '';
        return raw.trim() ? raw.trim().split(/\s+/) : [];
      }

      function applyFilters() {
        var query = normalize(input ? input.value.trim() : '');
        var selectedTag = tagSelect ? tagSelect.value : '';
        var range = rangeSelect ? rangeSelect.value : 'all';

        var visibleCount = 0;
        cards.forEach(function(card, i) {
          var name = normalize(card.getAttribute('data-event-name'));
          var venue = normalize(card.getAttribute('data-event-venue'));
          var desc = normalize(card.getAttribute('data-event-description'));
          var tags = cardTags(card);
          var matchesQuery = !query ||
            name.indexOf(query) !== -1 ||
            venue.indexOf(query) !== -1 ||
            desc.indexOf(query) !== -1;
          var matchesTag = !selectedTag || tags.indexOf(selectedTag) !== -1;
          // Skip range filtering on pages without a range select (e.g. /archive,
          // which is past-only and would otherwise be hidden by the >= today guard).
          var matchesRange = !rangeSelect || inRange(cardDates[i], range);
          var show = matchesQuery && matchesTag && matchesRange;
          card.style.display = show ? '' : 'none';
          if (show) visibleCount++;
        });

        if (empty) {
          empty.classList.toggle('active', visibleCount === 0 && cards.length > 0);
        }
      }

      if (input) input.addEventListener('input', applyFilters);
      if (tagSelect) tagSelect.addEventListener('change', applyFilters);
      if (rangeSelect) rangeSelect.addEventListener('change', applyFilters);

      // Initial state: pick range from URL ?range=, falling back to the
      // page default. URL also seeds search and tag filters.
      // Legacy ?kid=1 is honoured as ?tag=kid-friendly.
      var initialRange = defaultRange;
      try {
        var params = new URLSearchParams(window.location.search);
        var q = params.get('q');
        if (q && input) input.value = q;
        var tag = params.get('tag');
        if (!tag && params.get('kid') === '1') tag = 'kid-friendly';
        if (tag && tagSelect) {
          for (var i = 0; i < tagSelect.options.length; i++) {
            if (tagSelect.options[i].value === tag) {
              tagSelect.value = tag;
              break;
            }
          }
        }
        var rangeParam = params.get('range');
        if (rangeParam && VALID_RANGES[rangeParam]) initialRange = rangeParam;
      } catch (e) { /* ignore */ }

      if (rangeSelect) rangeSelect.value = initialRange;
      // Always run once so the default range filter is applied on load.
      applyFilters();
    });
  })();
  </script>

  <footer class="site-footer">
    <div class="container">
      <p>Terceira Events &mdash; A community guide to Terceira Island, A&ccedil;ores</p>
      <p class="attribution">Hero photo by <a href="https://commons.wikimedia.org/wiki/File:Angra_do_Hero%C3%ADsmo_-_Sicht_vom_Obelisken_auf_Stadt_und_Hafenbucht_mit_Monte_Brasil.JPG">Franzfoto</a> / CC BY-SA 3.0</p>
      <p class="attribution"><a href="{{ '/privacy' | relative_url }}">Privacy Policy</a></p>
    </div>
  </footer>
</body>
</html>

name: daily site rebuild

# Rebuild GitHub Pages daily so that time-based Liquid filters
# (e.g. "this week's events") stay current.

on:
  schedule:
    # 05:00 UTC every day — just before the CMAH ingest at 06:00.
    - cron: "0 5 * * *"
  workflow_dispatch: {}

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Pages rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: daily Pages rebuild"
          git push

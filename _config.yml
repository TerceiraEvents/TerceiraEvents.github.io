title: Terceira Events
description: >-
  Karaoke nights, concerts, festivals, and one-off events happening in
  Angra do Heroísmo and across Terceira Island, Açores. A community guide
  curated weekly.
tagline: What's happening on Terceira Island, Açores
author: Terceira Events
baseurl: ""
url: "https://terceiraevents.github.io"
timezone: Atlantic/Azores
lang: en

markdown: kramdown
permalink: /blog/:year/:slug/

# `jekyll-seo-tag` uses `logo` for the JSON-LD `Organization.logo`
# field (small square is fine, this is for Knowledge Graph).
logo: /assets/images/apple-touch-icon.png

# `image` is what jekyll-seo-tag puts into og:image / twitter:image
# (the link-preview thumbnail on Facebook, WhatsApp, Slack, LinkedIn).
# Facebook requires at least 600×315 px; the apple-touch-icon at 180×180
# is below that and would suppress the preview entirely. Using the same
# Wikipedia Commons hero photo the homepage already loads — it's
# 1280px wide so it satisfies all the social-card minimums. A locally
# hosted, purpose-built 1200×630 image would be cleaner long-term.
image: https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Angra_do_Hero%C3%ADsmo_-_Sicht_vom_Obelisken_auf_Stadt_und_Hafenbucht_mit_Monte_Brasil.JPG/1280px-Angra_do_Hero%C3%ADsmo_-_Sicht_vom_Obelisken_auf_Stadt_und_Hafenbucht_mit_Monte_Brasil.JPG

# Plugins. Both are on the github-pages allowlist, so they'll run on
# the live site without any pages-build configuration changes.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

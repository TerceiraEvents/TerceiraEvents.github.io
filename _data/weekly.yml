- day: Monday
  events:
  - name: Clube de Leitura
    venue: Lar Doce Livro
    address: Rua de São João 22-24, 9700-184 Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=Lar+Doce+Livro+Angra+do+Heroísmo
    time: "18:00"
    description: "Weekly book club. The book and exact start time vary each month (start typically falls between 18:00 and 18:30); the coordinator rotates monthly."
    note: "Check Instagram for the current month's book and exact start time. Their pinned monthly Agenda Cultural also lists it."
    instagram: https://www.instagram.com/livraria_lardocelivro/
    url: https://www.lardocelivro.pt
  - name: Live Music Night
    venue: Wine Not
    address: Rua Direita 8, Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=Wine+Not+Angra+do+Heroísmo
    time: "21:30"
    description: "Weekly live music: solo artists or DJs every Monday under rotating themed banners (Crazy Monday, Ya Monday for reggae, etc.). Check their Instagram for the week's lineup."
    instagram: https://www.instagram.com/winenot.terceira/

- day: Tuesday
  events:
  - name: O Novo Normal
    venue: Lar Doce Livro
    address: Rua de São João 22-24, 9700-184 Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=Lar+Doce+Livro+Angra+do+Heroísmo
    time: "18:15"
    description: "Live podcast and debate with Pedro Pereira, Francisco Simões, Joel Neto, and Luciano Barcelos. Same team every week; episodes also released on Spotify and Apple Podcasts (search 'O Novo Normal LDL')."
    note: "Lar Doce Livro posts a dedicated graphic the day before. Check Instagram for the week's topic."
    instagram: https://www.instagram.com/livraria_lardocelivro/
    url: https://www.lardocelivro.pt

- day: Wednesday
  events:
  - name: Karaoke Night
    venue: Tasca do Camões
    time: "20:30"
    description: Weekly karaoke at Camões
    address: Rua Da Rocha 64, 9700-169 Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=Tasca+do+Camões+Angra+do+Heroísmo
- day: Thursday
  events:
  - name: Latin Night
    venue: Tasca do Camões
    time: "20:30"
    description: Weekly Latin night
    note: "Salsa lesson at 19:00 with instructor Liliana Passos (@familiadancante) precedes the general Latin dancing from 20:30. Instructors stay around afterwards to help newcomers, so you can come with no prior dance experience."
    address: Rua Da Rocha 64, 9700-169 Angra do Heroísmo

    map_url: https://www.google.com/maps/search/?api=1&query=Tasca+do+Camões+Angra+do+Heroísmo
- day: Friday
  events:
  - name: Karaoke Night
    venue: The Texan
    address: Rua Carreira dos Cavalos 37, 9700-167 Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=The+Texan+Angra+do+Heroísmo
    time: "22:30"
    description: "Very popular! It often fills up at the start but seats open up around 23:30–midnight, so worth checking in later or grabbing a drink at the Texan bar while you wait."
    note: "Reservations are for dinner, not karaoke — if you reserve, you are expected to order dinner. Last dinner reservation is at 21:00. Reservations are cancelled 15 minutes after the set time, so you need to arrive by 21:15 at the latest. If you reserve at 21:00 and show up at 22:30 for karaoke, your reservation will already be cancelled!"
    url: https://www.thetexan.pt
  - name: Live Act Night
    venue: Havanna Club Terceira
    address: Porto das Pipas, 9700 Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=Havanna+Club+Terceira+Angra+do+Heroísmo
    time: "21:30"
    description: Weekly live DJ night at Havanna Club. Each week features a warm-up DJ plus a headline live act.
    note: "The lineup changes every week — check their Instagram (@havannaangra) to see who's playing."
    instagram: https://www.instagram.com/havannaangra/
  - name: 90s & 2000s Night
    venue: Porta 42
    address: Rua de São João, Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=Porta+42+Angra+do+Heroísmo
    time: "21:30"
    description: "Bar specialising in 90s and 2000s music. Themed banner varies week to week (Rock/Pop Rock, 90s & 2000s Vibes, etc.). Check Instagram for the week's lineup."
    note: "Doors at 21:30. Sometimes closed when Friday is a holiday; on long weekends they occasionally shift the slot to a Thursday instead."
    instagram: https://www.instagram.com/porta_42/
  - name: Concerto ao Vivo
    venue: Lar Doce Livro
    address: Rua de São João 22-24, 9700-184 Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=Lar+Doce+Livro+Angra+do+Heroísmo
    time: "21:00"
    description: "Weekly live music. House artists rotate (Pedro Xavier and João da Ilha both play regularly); the specific artist varies week to week."
    note: "Check Instagram for this week's artist; usually posted 1 to 2 days in advance."
    instagram: https://www.instagram.com/livraria_lardocelivro/
    url: https://www.lardocelivro.pt


- day: Friday
  events:
  - name: Karaoke Night
    venue: The Texan
    address: Rua Carreira dos Cavalos 37, 9700-167 Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=The+Texan+Angra+do+Heroísmo
    time: "22:30"
    description: "Very popular! It often fills up at the start but seats open up around 23:30–midnight, so worth checking in later or grabbing a drink at the Texan bar while you wait."
    note: "Reservations are for dinner, not karaoke — if you reserve, you are expected to order dinner. Last dinner reservation is at 21:00. Reservations are cancelled 15 minutes after the set time, so you need to arrive by 21:15 at the latest. If you reserve at 21:00 and show up at 22:30 for karaoke, your reservation will already be cancelled!"
    url: https://www.thetexan.pt


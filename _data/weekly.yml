- day: Sunday
  events:
  - name: Poesia/Prosa ao Crepúsculo
    venue: Lar Doce Livro
    address: Rua de São João 22-24, 9700-184 Angra do Heroísmo
    map_url: https://www.google.com/maps/search/?api=1&query=Lar+Doce+Livro+Angra+do+Heroísmo
    time: "18:00"
    description: "Weekly literary gathering coordinated by Valter Peres with a regular group. The name alternates between Poesia (poetry) and Prosa (prose) depending on the week's format, but it's the same recurring event. Lar Doce Livro describes it as the gathering that defines them most."
    note: "Posted a few days in advance on Instagram."
    instagram: https://www.instagram.com/livraria_lardocelivro/
    url: https://www.lardocelivro.pt

- name: "Teatro Angrense"
  address: "Rua da Esperança 48-52, 9700-073 Angra do Heroísmo"
  map_url: "https://www.google.com/maps/search/?api=1&query=Teatro+Angrense+Angra+do+Hero%C3%ADsmo"
  description: "Historic theater in the UNESCO-listed city center. Hosts plays, concerts, fado nights, and the annual Festival de Teatro. One of the main cultural venues on Terceira."
  links:
    - { label: "Website", url: "https://angradoheroismo.pt/local/teatro-angrense-2/" }
    - { label: "Tickets (Ticketline)", url: "https://ticketline.sapo.pt/en/salas/sala/1293" }
  schema_type: PerformingArtsTheater


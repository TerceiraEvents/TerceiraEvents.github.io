- name: "Porta 42"
  address: "Rua de São João, Angra do Heroísmo"
  map_url: "https://www.google.com/maps/search/?api=1&query=Porta+42+Angra+do+Hero%C3%ADsmo"
  description: "Bar specialising in 90s and 2000s music. Doors at 21:30. Themed banners rotate week to week (Rock/Pop Rock, 90s & 2000s Vibes, etc.); check Instagram for the current week."
  weekly:
    - day: "Friday:"
      name: "90s & 2000s Night"
    - day: "Saturday:"
      name: "90s & 2000s Night"
  description_after_weekly: "Sometimes closed when Friday falls on a holiday; on long weekends they occasionally shift to a Thursday instead. Saturday is the most consistent slot."
  links:
    - { label: "Instagram", url: "https://www.instagram.com/porta_42/" }
  schema_type: BarOrPub

- name: "Lar Doce Livro"

# Venues hosting events in Angra do Heroísmo, Terceira.
#
# Schema (all fields optional except `name` and `address`):
#   name              — venue display name (required)
#   address           — full street address (required, used for the venue-address line)
#   map_url           — Google Maps URL for the "Map" link
#   description       — main descriptive prose paragraph (rendered before the weekly schedule)
#   description_after_weekly — optional second paragraph rendered after the weekly schedule
#   weekly            — list of {day, name} for the weekly schedule UL (rendered between description and description_after_weekly)
#   links             — list of {label, url} rendered as a paragraph joined by ` · `
#   reservation_phone — phone number rendered after links: "Reservations: <phone>"
#   reservation_url   — URL for an event-reservations CTA button
#   reservation_label — button text (default "Make a dinner reservation")
#   schema_type       — Schema.org subtype for JSON-LD (default LocalBusiness)
#   telephone         — E.164 phone for JSON-LD (used when reservation_phone is set, defaults to a normalised reservation_phone)

- name: "Tasca do Camões"
  address: "Rua Da Rocha 64, 9700-169 Angra do Heroísmo"
  map_url: "https://www.google.com/maps/search/?api=1&query=Tasca+do+Cam%C3%B5es+Angra+do+Hero%C3%ADsmo"
  weekly:
    - day: Wednesday
      name: Karaoke Night
    - day: Thursday
      name: Latin Night
  description_after_weekly: "Also hosts live concerts and special events throughout the year."
  schema_type: BarOrPub

- name: "The Texan / The Garden Club"
  address: "Rua Carreira dos Cavalos 37, 9700-167 Angra do Heroísmo"
  map_url: "https://www.google.com/maps/search/?api=1&query=The+Texan+Angra+do+Hero%C3%ADsmo"
  description: "Tex-Mex restaurant and bar with cocktails, large screens for sports, and a garden event space. The Texan handles dinner and karaoke; The Garden Club is the outdoor garden area for brunches, parties, and events."
  weekly:
    - day: Friday
      name: Karaoke Night
    - day: Saturday
      name: Karaoke Night
  links:
    - { label: "Website", url: "https://www.thetexan.pt" }
    - { label: "Instagram (Texan)", url: "https://www.instagram.com/thetexanbar/" }
    - { label: "Instagram (Garden Club)", url: "https://www.instagram.com/thegardenclub.angra/" }
  reservation_url: "https://the-texan-1755256381.resos.com/booking"
  reservation_label: "Make a dinner reservation"
  schema_type: Restaurant


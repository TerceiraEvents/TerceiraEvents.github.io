# Shared tag vocabulary for special events.
#
# `slug` is what goes into each event's `tags:` list and is used for
# filtering in the URL (e.g. /calendar?tag=kid-friendly). `label` and
# `emoji` drive the UI pill and dropdown.
#
# Keep this list in sync with:
#   - TerceiraEventsApp     src/utils/tags.js
#   - event-submit-worker   src/tags.js
#

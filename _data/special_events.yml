- name: "ESCAMA: de dragão 2#"
  date: 2026-05-09
  time: "21:00"
  venue: "AMIT"
  address: "Av. Tenente Coronel José Agostinho 6-A, 9700-108 Angra do Heroísmo"
  map_url: https://www.google.com/maps/search/?api=1&query=Academia+Musical+Ilha+Terceira+Angra+do+Heroísmo
  description: "O dragão volta a cuspir fogo.\n\nNo dia 9 de maio, às 21h30, o AMIT recebe mais uma edição da vertente Dragão — intensidade máxima, som cru e energia sem travão.\n\nUma noite dedicada ao thrash e death metal, com três momentos de peso:\n\nMorbid Death (São Miguel)\nFormados em 1990, são uma referência do metal açoriano. Com uma longa trajetória e várias mudanças de formação, apresentam hoje um som próximo do thrash/death melódico, marcado pela constante evolução. Regressam à Terceira para apresentar o novo álbum e a nova formação — um momento raro e imperdível.\n\nDamage Device (Terceira)\nForça local com uma presença em palco intensa e demolidora. Misturam thrash, crossover e punk, com letras diretas e afiadas.\n\nBoi (Miguel Linhares) — Playlist\nVeterano da cena punk e metal da ilha Terceira, ligado à banda Manifesto e a vários projetos culturais ao longo das últimas décadas. Fecha a noite com uma seleção poderosa entre o rock e o metal.\n\nOrganização: AAIP\nProdução: Desinsofrido\nParceria: Basalto Cultural\nApoio: AMIT\n\nA parceria com a Bela Cerveja mantém-se, com as cervejas Bela e Climax disponíveis. Parte das receitas reverte para apoiar os próximos eventos culturais da associação.\n\nEntrada (com oferta de bebida)\n5€ — sócios\n8€ — não sócios\n\nReservas: aaipazores@gmail.com\n\nFora do circuito. Dentro da ilha."
  instagram: "https://www.instagram.com/aaipazores?igsh=aTFpZnpwaWI1cnJp"
  image: /assets/images/events/escama-de-dragao-2-20260509.jpg
  tags:
  - live-music
  - nightlife


  description: "Welcoming, informal gathering for immigrants in Terceira. Meet new people, ask questions, and enjoy food from different cultures — bring a traditional dish from your country if you wish. During the official program, attendees are invited to come prepared with a short (~10 min) story to share: where you're from, why you chose the Azores, why Terceira, and 1–3 amazing discoveries about living on an island. Small raffle with an edible prize. Bar with traditional drinks. After the official program: music, dancing and social time. Roughly 3 hours."
